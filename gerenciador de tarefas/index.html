<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">    
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Gerenciador de Tarefas</h1>
    </div>

    <div class="container text-center">
         <div class="row">
            <div class="col">
                <input type="text" id="tarefa" placeholder="Insira a tarefa...">
                <select id="prioridade">
                    <option>Baixa</option>
                    <option>Média</option>
                    <option>Alta</option>    
                </select>
                <button onclick="valores()">Mostrar</button>                
            </div>

        </div>    
  </div>





    <script>
        function valores() {
            let valor = document.getElementById('tarefa').value;
            let estado = document.getElementById('prioridade').value;
            criarCard(valor, estado)
        }

        function criarCard(valor, estado) {
            let corCard = "";

            if (estado === "Alta") {
                corCard = "text-bg-danger";   
            } else if (estado === "Média") {
                corCard = "text-bg-warning";  
            } else {
                corCard = "text-bg-success";  
            }

            let container = document.createElement('div');
            container.className = "container text-center";

            container.innerHTML = `
                <div class="row">
                    <div class="col-12">
                        <div class="card ${corCard} col-3" style="width: 18rem;">
                                <div class="card-body">
                                    <h5 class="card-title">Prioridade: ${estado}</h5>
                                    <p class="card-text">${valor}</p>
                                </div>
                        </div>
                    </div>
                </div>
            `;

            document.body.appendChild(container);


}  

    </script>
</body>
</html>
